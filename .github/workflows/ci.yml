name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Check for console.log (must use Winston)
        run: |
          if grep -rn "console\.\(log\|error\|warn\)" src/ --include="*.ts" | grep -v "// eslint-disable" | grep -v "node_modules"; then
            echo "❌ Found console.log usage. Use Winston logger instead."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm test -- --coverage
        env:
          MONGODB_URI: mongodb://localhost:27017/kisanseva-test
          NODE_ENV: test
          DISABLE_RATE_LIMIT: 'true'
      - name: Check coverage threshold
        run: |
          # Fail if coverage below 60%
          echo "Coverage report generated"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk-ant-\|AIzaSy\|mongodb+srv://.*:.*@" src/ --include="*.ts"; then
            echo "❌ Possible hardcoded secret found!"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
